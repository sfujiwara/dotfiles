name: Ubuntu

on: [push]

jobs:

  ubuntu:

    runs-on: ubuntu-20.04

    steps:
      - uses: actions/checkout@v2

      - name: Install git
        run: |
          sudo apt update
          sudo apt install -y git

      - name: Install packages via apt
        run: ./bin/apt.sh

      - name:
        run: |
          if [ ! -d "$HOME/.pyenv" ]; then
            git clone https://github.com/yyuu/pyenv.git ~/.pyenv
          fi
